[build]
command = "npm run build"
publish = "dist"
functions = "api"

[build.environment]
NODE_VERSION = "20"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "DENY"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
for = "/api/*"
[headers.values]
Cache-Control = "no-cache, no-store, must-revalidate"

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/catch-all"
status = 200

# Backend environment variables for database and Supabase
[context.production]
environment = { DATABASE_URL = "", SUPABASE_URL = "", SUPABASE_ANON_KEY = "", ENVIRONMENT = "production" }

# Frontend environment variables (can be set via netlify env:set command)
# Required variables:
# - VITE_API_URL: https://creator-commerce-hub.netlify.app/api (or your Netlify backend URL)
# - VITE_CREATOR_REGISTRY_ADDRESS: 0x875E8bbA262553411DEE69748cbEcB7189a240d4
# - VITE_IP_MARKETPLACE_ADDRESS: 0xb7792cE67ce25894edD492E1927cf007c6f2cB7d
# - VITE_WALLETCONNECT_PROJECT_ID: creator-commerce-hub
